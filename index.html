<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Thynk Unlimited - AR Member Card</title>
    
    <!-- Load A-Frame first -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <!-- Then load MindAR -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        }
        
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: #DAA520;
        }
        
        #loading-screen.hidden {
            display: none;
        }
        
        .loader {
            border: 4px solid rgba(218, 165, 32, 0.2);
            border-top: 4px solid #DAA520;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        #loading-text {
            font-size: 18px;
            font-weight: 500;
            margin-top: 10px;
        }
        
        #start-button {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #DAA520 0%, #B8860B 100%);
            color: #1a1a1a;
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            z-index: 10000;
            box-shadow: 0 10px 30px rgba(218, 165, 32, 0.3);
            transition: all 0.3s ease;
        }
        
        #start-button:hover {
            transform: translate(-50%, -50%) scale(1.05);
            box-shadow: 0 15px 40px rgba(218, 165, 32, 0.5);
        }
        
        #start-button:active {
            transform: translate(-50%, -50%) scale(0.95);
        }
        
        #start-button.hidden {
            display: none;
        }
        
        #instructions {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: #DAA520;
            padding: 15px 25px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 500;
            z-index: 1000;
            text-align: center;
            max-width: 80%;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(218, 165, 32, 0.3);
        }
        
        #status {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: #DAA520;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 14px;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(218, 165, 32, 0.3);
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loader"></div>
        <div id="loading-text">Loading AR Experience...</div>
    </div>
    
    <!-- Start Button -->
    <button id="start-button">🎬 Start AR Experience</button>
    
    <!-- Status Indicator -->
    <div id="status">Ready</div>
    
    <!-- AR Instructions -->
    <div id="instructions">
        📱 Point your camera at the member card
    </div>
    
    <!-- A-Frame Scene with MindAR -->
    <a-scene
        mindar-image="imageTargetSrc: ./assets/targets/targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;"
        color-space="sRGB"
        renderer="colorManagement: true, physicallyCorrectLights"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        embedded>
        
        <!-- Asset Management -->
        <a-assets>
            <video
                id="club-video"
                src="./assets/videos/intro-mobile.mp4"
                preload="auto"
                playsinline
                webkit-playsinline
                muted
                loop
                crossorigin="anonymous">
            </video>
        </a-assets>
        
        <!-- AR Camera -->
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        
        <!-- Image Target Entity -->
        <a-entity mindar-image-target="targetIndex: 0" id="target">
            <!-- Video Plane attached to the card - Using video element directly -->
            <a-video
                id="video-plane"
                src="#club-video"
                position="0 0 0.1"
                height="0.552"
                width="1"
                rotation="0 0 0">
            </a-video>
        </a-entity>
    </a-scene>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const sceneEl = document.querySelector('a-scene');
            const video = document.querySelector('#club-video');
            const videoPlane = document.querySelector('#video-plane');
            const target = document.querySelector('#target');
            const instructions = document.querySelector('#instructions');
            const loadingScreen = document.querySelector('#loading-screen');
            const startButton = document.querySelector('#start-button');
            const status = document.querySelector('#status');
            
            let arStarted = false;
            let isTracking = false;
            
            // Hide loading screen when scene loads
            sceneEl.addEventListener('loaded', function() {
                console.log('Scene loaded');
                loadingScreen.classList.add('hidden');
            });
            
            // Start AR button click handler
            startButton.addEventListener('click', async function() {
                console.log('Start button clicked');
                
                try {
                    // Prime the video
                    video.muted = true;
                    await video.play();
                    console.log('Video primed successfully');
                    video.pause();
                    video.currentTime = 0;
                } catch (err) {
                    console.log('Video prime:', err.message);
                }
                
                // Start MindAR
                const mindARSystem = sceneEl.systems['mindar-image-system'];
                if (mindARSystem) {
                    await mindARSystem.start();
                    console.log('MindAR started');
                }
                
                arStarted = true;
                startButton.classList.add('hidden');
                status.textContent = '🔍 Searching for card...';
            });
            
            // Target tracking events
            if (target) {
                target.addEventListener('targetFound', async function() {
                    console.log('Target found!');
                    isTracking = true;
                    status.textContent = '✅ Card detected!';
                    
                    // Make video plane visible
                    if (videoPlane) {
                        videoPlane.setAttribute('visible', true);
                        videoPlane.setAttribute('opacity', 1);
                    }
                    
                    if (instructions) {
                        instructions.style.opacity = '0.3';
                    }
                    
                    // Play video
                    if (video && arStarted) {
                        try {
                            video.currentTime = 0;
                            video.muted = true;
                            const playPromise = video.play();
                            
                            if (playPromise !== undefined) {
                                await playPromise;
                                console.log('Video playing - duration:', video.duration, 'currentTime:', video.currentTime);
                                status.textContent = '▶️ Playing';
                                
                                // Force material update
                                if (videoPlane) {
                                    const material = videoPlane.getAttribute('material');
                                    videoPlane.setAttribute('material', 'src', '#club-video');
                                    videoPlane.setAttribute('material', 'shader', 'flat');
                                    console.log('Material updated');
                                }
                            }
                        } catch (err) {
                            console.error('Video play error:', err);
                            status.textContent = '⚠️ ' + err.message;
                        }
                    }
                });
                
                target.addEventListener('targetLost', function() {
                    console.log('Target lost');
                    isTracking = false;
                    status.textContent = '🔍 Searching...';
                    
                    // Keep video plane visible but pause
                    if (videoPlane) {
                        videoPlane.setAttribute('visible', false);
                    }
                    
                    if (instructions) {
                        instructions.style.opacity = '1';
                    }
                    
                    if (video) {
                        video.pause();
                        console.log('Video paused');
                    }
                });
            }
            
            // Fallback: Tap anywhere on screen to play video
            document.body.addEventListener('click', async function(e) {
                if (e.target !== startButton && isTracking && video.paused) {
                    try {
                        await video.play();
                        console.log('Video started via tap');
                    } catch (err) {
                        console.error('Tap play failed:', err);
                    }
                }
            });
            
            // Debug: Log video state every 2 seconds when tracking
            setInterval(() => {
                if (isTracking && video) {
                    console.log('Video state:', {
                        paused: video.paused,
                        currentTime: video.currentTime.toFixed(2),
                        duration: video.duration.toFixed(2),
                        videoWidth: video.videoWidth,
                        videoHeight: video.videoHeight,
                        planeVisible: videoPlane ? videoPlane.getAttribute('visible') : 'N/A'
                    });
                }
            }, 2000);
            
            // Additional ready check
            if (sceneEl.hasLoaded) {
                loadingScreen.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
