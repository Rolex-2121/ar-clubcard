<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Thynk Unlimited - AR Member Card</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        }
            /* ensure the A-Frame canvas covers the whole screen */
            a-scene, #ar-scene, .a-canvas {
                position: fixed !important;
                top: 0 !important;
                left: 0 !important;
                width: 100% !important;
                height: 100% !important;
                pointer-events: none; /* let UI buttons still be clickable */
            }
            /* push camera video behind the canvas */
            video {
                z-index: -10 !important;
            }
        
        /* loading screen container */
        #loading-screen {
            height: 100%;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: #DAA520;
        }
        
        #loading-screen.hidden {
            display: none;
        }
        
        .loader {
            border: 4px solid rgba(218, 165, 32, 0.2);
            border-top: 4px solid #DAA520;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        #loading-text {
            font-size: 18px;
            font-weight: 500;
            margin-top: 10px;
        }
        
        #start-button {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #DAA520 0%, #B8860B 100%);
            color: #1a1a1a;
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            z-index: 10000;
            box-shadow: 0 10px 30px rgba(218, 165, 32, 0.3);
            transition: all 0.3s ease;
        }
        
        #start-button:hover {
            transform: translate(-50%, -50%) scale(1.05);
        }
        
        #start-button.hidden {
            display: none;
        }
        
        #instructions {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: #DAA520;
            padding: 15px 25px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 500;
            z-index: 1000;
            text-align: center;
            max-width: 80%;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(218, 165, 32, 0.3);
        }
        
        #status {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: #DAA520;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 14px;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(218, 165, 32, 0.3);
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="loader"></div>
        <div id="loading-text">Loading AR Experience...</div>
    </div>
    
    <button id="start-button">🎬 Start AR Experience</button>
    <div id="status">Ready</div>
    <div id="instructions">📱 Point your camera at the member card</div>
    <!-- debug helper: show the raw video in a corner so we can verify content -->
    <video id="debug-video" controls style="position:fixed;bottom:10px;right:10px;width:120px;z-index:10000;background:#000"></video>
    
    <a-scene
        id="ar-scene"
        mindar-image="imageTargetSrc: ./assets/targets/targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;"
        color-space="sRGB"
        renderer="colorManagement: true, physicallyCorrectLights"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video
                id="club-video"
                src="./assets/videos/intro-mobile.mp4"
                preload="auto"
                playsinline
                webkit-playsinline
                muted
                loop
                crossorigin="anonymous">
            </video>
        </a-assets>
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <!-- debug plane fixed one meter in front of camera -->
        <a-entity id="debug-static" position="0 0 -1">
            <a-plane color="red" width="0.5" height="0.3" side="double"></a-plane>
        </a-entity>
        
        <a-entity mindar-image-target="targetIndex: 0" id="target">
            <a-plane
                id="video-plane"
                position="0 0 0"
                height="0.552"
                width="1"
                rotation="0 0 0"
                material="shader: flat; side: double">
            </a-plane>
        </a-entity>
    </a-scene>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const sceneEl = document.querySelector('a-scene');
            const video = document.querySelector('#club-video');
            const videoPlane = document.querySelector('#video-plane');
            const target = document.querySelector('#target');
            const loadingScreen = document.querySelector('#loading-screen');
            const startButton = document.querySelector('#start-button');
            const status = document.querySelector('#status');
            
            let arStarted = false;
            let videoTexture = null;
            
            sceneEl.addEventListener('loaded', function() {
                console.log('Scene loaded');
                loadingScreen.classList.add('hidden');

                // log video loading status/errors so we know what's happening
                video.addEventListener('loadeddata', () => {
                    console.log('Video loadeddata event',{readyState:video.readyState, videoWidth:video.videoWidth, videoHeight:video.videoHeight});
                });
                video.addEventListener('loadedmetadata', () => console.log('Video loadedmetadata event'));
                video.addEventListener('error', (e) => console.error('Video error event', e));
                video.addEventListener('play', () => {
                    console.log('Video play event',{readyState:video.readyState, currentTime:video.currentTime});
                    if (video.readyState < 2) {
                        console.warn('Video readyState low', video.readyState);
                    }
                }); 
                video.addEventListener('pause', () => console.log('Video pause event',{currentTime:video.currentTime}));

                // make sure video element actually begins loading
                video.load();

                // create a Three.js texture immediately
                if (!videoTexture) {
                    videoTexture = new THREE.VideoTexture(video);
                    videoTexture.minFilter = THREE.LinearFilter;
                    videoTexture.magFilter = THREE.LinearFilter;
                    videoTexture.format = THREE.RGBAFormat;
                    console.log('VideoTexture created');
                }

                // apply texture using A-Frame's material system (works better with MindAR)
                videoPlane.setAttribute('material', {
                    shader: 'flat',  // flat shader for simple video playback without lighting
                    side: 'double'
                });
                console.log('Flat material applied via A-Frame setAttribute');
            });
            
            startButton.addEventListener('click', async function() {
                console.log('Start button clicked');
                
                try {
                    video.muted = true;
                    await video.play();
                    console.log('Video primed');
                    video.pause();
                    video.currentTime = 0;
                } catch (err) {
                    console.log('Prime:', err.message);
                }
                
                const mindARSystem = sceneEl.systems['mindar-image-system'];
                if (mindARSystem) {
                    await mindARSystem.start();
                    console.log('MindAR started');
                }
                
                arStarted = true;
                startButton.classList.add('hidden');
                status.textContent = '🔍 Searching...';
            });
            
            if (target) {
                target.addEventListener('targetFound', function() {
                    console.log('✅ Target found!');
                    status.textContent = '▶️ Playing';
                    
                    // DEBUG: inspect what MindAR actually created
                    console.log('Target entity:', target);
                    console.log('Target children:', target.children.length);
                    console.log('VideoPlane:', videoPlane);
                    
                    // Try to find ANY mesh in the target entity tree
                    let foundMesh = null;
                    const searchForMesh = (obj) => {
                        if (obj.type === 'Mesh') {
                            console.log('Found mesh:', obj, {geometry: obj.geometry, material: obj.material});
                            return obj;
                        }
                        if (obj.children) {
                            for (let child of obj.children) {
                                const result = searchForMesh(child);
                                if (result) return result;
                            }
                        }
                        return null;
                    };
                    
                    // Get the Three.js object3D from the target
                    const targetObj3D = target.object3D;
                    if (targetObj3D) {
                        foundMesh = searchForMesh(targetObj3D);
                        console.log('Mesh found in target tree:', !!foundMesh);
                    }
                    
                    // Also check videoPlane
                    const planeMesh = videoPlane.getObject3D('mesh');
                    console.log('VideoPlane mesh:', planeMesh);
                    
                    // Apply texture to whichever mesh we found
                    const mesh = foundMesh || planeMesh;
                    if (mesh && mesh.material) {
                        // log transform and geometry bounds
                        console.log('DEBUG mesh transform', mesh.position.clone(), mesh.rotation.clone(), mesh.scale.clone(), mesh.geometry ? mesh.geometry.boundingBox : 'no bounds');
                        console.log('DEBUG material props', {side: mesh.material.side, opacity: mesh.material.opacity, visible: mesh.material.visible});
                        // ensure material is double sided and visible
                        mesh.material.side = THREE.DoubleSide;
                        mesh.material.transparent = true;
                        mesh.material.opacity = 0; // start transparent
                        mesh.material.visible = true;
                        // nudge forward and render on top
                        mesh.position.z += 0.01;
                        mesh.renderOrder = 999;
                        mesh.material.depthTest = false;
                        // start small for scale animation
                        mesh.scale.set(0.1,0.1,0.1);

                        // animate scale & opacity to 1 over 400ms
                        const startTime = performance.now();
                        const duration = 400;
                        const initialScale = mesh.scale.clone();
                        const animate = (t) => {
                            const elapsed = t - startTime;
                            const frac = Math.min(1, elapsed / duration);
                            const s = initialScale.clone().lerp(new THREE.Vector3(1,1,1), frac);
                            mesh.scale.copy(s);
                            mesh.material.opacity = frac;
                            mesh.material.needsUpdate = true;
                            if (frac < 1) requestAnimationFrame(animate);
                        };
                        requestAnimationFrame(animate);

                        if (videoTexture) {
                            // after delay show video
                            setTimeout(() => {
                                if (mesh && mesh.material) {
                                    mesh.material.map = videoTexture;
                                    mesh.material.color.set(0xffffff);
                                    mesh.material.needsUpdate = true;
                                    console.log('TEST: VideoTexture applied');
                                }
                            }, 2000);
                        }
                    } else {
                        console.warn('No mesh found!', {mesh: !!mesh, hasGeometry: mesh?.geometry, hasMaterial: mesh?.material});
                    }
                    
                    if (video && arStarted) {
                        try {
                            video.currentTime = 0;
                            video.play().catch(err => console.error('Play failed:', err));
                            console.log('Video playing',{readyState:video.readyState, videoWidth:video.videoWidth, videoHeight:video.videoHeight});

                            const dbg = document.querySelector('#debug-video');
                            if (dbg) {
                                dbg.src = video.src;
                                dbg.currentTime = video.currentTime;
                                dbg.muted = true;
                                dbg.play().catch(()=>{});
                            }
                        } catch (err) {
                            console.error('Play error:', err);
                        }
                    }
                });
                
                target.addEventListener('targetLost', function() {
                    console.log('❌ Target lost');
                    status.textContent = '🔍 Searching...';
                    if (video) {
                        video.pause();
                    }
                });
            }

            // ensure texture updates every frame
            let updateCount = 0;
            sceneEl.addEventListener('render', function() {
                if (videoTexture && video.readyState >= 2) {
                    videoTexture.needsUpdate = true;
                }
            });
        });
    </script>
</body>
</html>
