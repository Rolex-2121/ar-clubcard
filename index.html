<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Thynk Unlimited - AR Member Card</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        }
        
        a-scene, #ar-scene, .a-canvas {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            pointer-events: none;
        }
        
        video {
            z-index: -10 !important;
        }
        
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: #DAA520;
        }
        
        #loading-screen.hidden {
            display: none;
        }
        
        .loader {
            border: 4px solid rgba(218, 165, 32, 0.2);
            border-top: 4px solid #DAA520;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        #loading-text {
            font-size: 18px;
            font-weight: 500;
            margin-top: 10px;
        }
        
        #start-button {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #DAA520 0%, #B8860B 100%);
            color: #1a1a1a;
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            z-index: 10000;
            box-shadow: 0 10px 30px rgba(218, 165, 32, 0.3);
            transition: all 0.3s ease;
            pointer-events: auto;
        }
        
        #start-button:hover {
            transform: translate(-50%, -50%) scale(1.05);
        }
        
        #start-button.hidden {
            display: none;
        }
        
        #instructions {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: #DAA520;
            padding: 15px 25px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 500;
            z-index: 1000;
            text-align: center;
            max-width: 80%;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(218, 165, 32, 0.3);
        }
        
        #status {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: #DAA520;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 14px;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(218, 165, 32, 0.3);
        }

        /* Unmute button - shown as fallback if audio is blocked */
        #unmute-btn {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: #DAA520;
            padding: 12px 22px;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 600;
            border: 1px solid rgba(218, 165, 32, 0.5);
            cursor: pointer;
            z-index: 1001;
            backdrop-filter: blur(10px);
            pointer-events: auto;
            display: none;
            transition: all 0.3s ease;
        }

        #unmute-btn:hover {
            background: rgba(218, 165, 32, 0.2);
        }

        #unmute-btn.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="loader"></div>
        <div id="loading-text">Loading AR Experience...</div>
    </div>
    
    <button id="start-button">👆 Tap to Unlock Magic</button>
    <div id="status" style="display: none;">Ready</div>
    <div id="instructions" style="display: none;">📱 Point your camera at the member card</div>
    <button id="unmute-btn">🔊 Tap to Enable Sound</button>
    
    <a-scene
        id="ar-scene"
        mindar-image="imageTargetSrc: ./assets/targets/targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;"
        color-space="sRGB"
        renderer="colorManagement: true, physicallyCorrectLights"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video
                id="club-video"
                src="./assets/videos/intro-mobile.mp4"
                preload="auto"
                playsinline
                webkit-playsinline
                loop
                crossorigin="anonymous">
                <!-- NOTE: 'muted' removed so audio plays. Browser autoplay policy
                     requires a user gesture first — handled via the Start button. -->
            </video>
        </a-assets>
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        
        <a-entity mindar-image-target="targetIndex: 0" id="target">
            <!-- 
                Card aspect ratio: 849x534 = 1.59:1
                Video aspect ratio: 1280x720 = 1.78:1
                Adjusted height to match card better: 0.63 (1/1.59)
            -->
            <a-plane
                id="video-plane"
                position="0 0 0"
                width="1"
                height="0.63"
                rotation="0 0 0"
                material="shader: flat; side: double">
            </a-plane>
        </a-entity>
    </a-scene>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const sceneEl = document.querySelector('a-scene');
            const video = document.querySelector('#club-video');
            const videoPlane = document.querySelector('#video-plane');
            const target = document.querySelector('#target');
            const loadingScreen = document.querySelector('#loading-screen');
            const startButton = document.querySelector('#start-button');
            const status = document.querySelector('#status');
            const unmuteBtn = document.querySelector('#unmute-btn');
            
            let arStarted = false;
            let videoTexture = null;
            let audioUnlocked = false;

            // ── Audio unlock helper ──────────────────────────────────────────
            // Browsers block audio until a user gesture has interacted with
            // the media element. We attempt to play+pause on the Start button
            // click (which IS a user gesture), then unmute for real playback.
            function unlockAudio() {
                if (audioUnlocked) return Promise.resolve();
                video.muted = false;
                video.volume = 1.0;
                // Brief silent play to satisfy autoplay policy
                return video.play().then(() => {
                    video.pause();
                    video.currentTime = 0;
                    audioUnlocked = true;
                    console.log('Audio unlocked ✅');
                }).catch(err => {
                    // Audio blocked — keep muted and show unmute button as fallback
                    console.warn('Audio autoplay blocked:', err.message);
                    video.muted = true;
                    unmuteBtn.classList.add('visible');
                });
            }

            // Unmute button — acts as a second user-gesture opportunity
            unmuteBtn.addEventListener('click', function() {
                video.muted = false;
                video.volume = 1.0;
                audioUnlocked = true;
                // If video is already playing, this is all that's needed
                if (!video.paused) {
                    unmuteBtn.classList.remove('visible');
                } else {
                    video.play().then(() => {
                        unmuteBtn.classList.remove('visible');
                    }).catch(err => console.error('Unmute play failed:', err));
                }
            });

            // ── Scene ready ──────────────────────────────────────────────────
            sceneEl.addEventListener('loaded', function() {
                console.log('Scene loaded');
                loadingScreen.classList.add('hidden');

                video.addEventListener('loadeddata', () => {
                    console.log('Video loaded:', {
                        videoWidth: video.videoWidth,
                        videoHeight: video.videoHeight,
                        aspectRatio: (video.videoWidth / video.videoHeight).toFixed(2)
                    });
                });
                
                video.load();

                if (!videoTexture) {
                    videoTexture = new THREE.VideoTexture(video);
                    videoTexture.minFilter = THREE.LinearFilter;
                    videoTexture.magFilter = THREE.LinearFilter;
                    videoTexture.format = THREE.RGBAFormat;
                    console.log('VideoTexture created');
                }

                videoPlane.setAttribute('material', {
                    shader: 'flat',
                    side: 'double'
                });
            });
            
            // ── Start button ─────────────────────────────────────────────────
            startButton.addEventListener('click', async function() {
                console.log('Start button clicked');

                // Unlock audio using this user gesture
                await unlockAudio();
                
                const mindARSystem = sceneEl.systems['mindar-image-system'];
                if (mindARSystem) {
                    await mindARSystem.start();
                    console.log('MindAR started');
                }
                
                arStarted = true;
                startButton.classList.add('hidden');
                status.style.display = 'block';
                document.getElementById('instructions').style.display = 'block';
                status.textContent = '🔍 Searching...';
            });
            
            // ── Target detected ──────────────────────────────────────────────
            if (target) {
                target.addEventListener('targetFound', function() {
                    console.log('✅ Target found!');
                    status.textContent = '▶️ Playing';
                    
                    const searchForMesh = (obj) => {
                        if (obj.type === 'Mesh') return obj;
                        if (obj.children) {
                            for (let child of obj.children) {
                                const result = searchForMesh(child);
                                if (result) return result;
                            }
                        }
                        return null;
                    };
                    
                    const targetObj3D = target.object3D;
                    const planeMesh = videoPlane.getObject3D('mesh');
                    const mesh = searchForMesh(targetObj3D) || planeMesh;
                    
                    if (mesh && mesh.material) {
                        mesh.material.side = THREE.DoubleSide;
                        mesh.material.transparent = true;
                        mesh.material.opacity = 0;
                        mesh.material.visible = true;
                        mesh.position.z += 0.01;
                        mesh.renderOrder = 999;
                        mesh.material.depthTest = false;
                        mesh.scale.set(0.1, 0.1, 0.1);

                        const startTime = performance.now();
                        const duration = 400;
                        const initialScale = mesh.scale.clone();
                        
                        const animate = (t) => {
                            const elapsed = t - startTime;
                            const frac = Math.min(1, elapsed / duration);
                            const s = initialScale.clone().lerp(new THREE.Vector3(1, 1, 1), frac);
                            mesh.scale.copy(s);
                            mesh.material.opacity = frac;
                            mesh.material.needsUpdate = true;
                            if (frac < 1) requestAnimationFrame(animate);
                        };
                        requestAnimationFrame(animate);

                        setTimeout(() => {
                            if (mesh && mesh.material && videoTexture) {
                                mesh.material.map = videoTexture;
                                mesh.material.color.set(0xffffff);
                                mesh.material.needsUpdate = true;
                                console.log('VideoTexture applied to mesh');
                            }
                        }, 500);
                    }
                    
                    // Play video WITH audio
                    if (video && arStarted) {
                        video.muted = !audioUnlocked; // muted only if audio wasn't unlocked
                        video.currentTime = 0;
                        video.play().then(() => {
                            console.log('Video playing with audio:', audioUnlocked);
                            // If audio was blocked, prompt user
                            if (!audioUnlocked) {
                                unmuteBtn.classList.add('visible');
                            }
                        }).catch(err => {
                            console.error('Play failed:', err);
                        });
                    }
                });
                
                target.addEventListener('targetLost', function() {
                    console.log('❌ Target lost');
                    status.textContent = '🔍 Searching...';
                    unmuteBtn.classList.remove('visible');
                    if (video) {
                        video.pause();
                    }
                });
            }

            // ── Render loop: keep texture fresh ─────────────────────────────
            sceneEl.addEventListener('render', function() {
                if (videoTexture && video.readyState >= 2) {
                    videoTexture.needsUpdate = true;
                }
            });
        });
    </script>
</body>
</html>
